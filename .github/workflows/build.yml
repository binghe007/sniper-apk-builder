name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv git openjdk-17-jdk unzip zip \
            libltdl-dev libffi-dev libssl-dev autoconf libtool \
            libc6-i386 lib32z1 lib32ncurses6 lib32stdc++6

      - name: Install Buildozer and Cython
        run: |
          pip3 install cython buildozer

      - name: Install Android SDK (with compatibility symlink)
        run: |
          ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT

          # 下载命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true

          # 设置环境变量
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          # 接受许可
          yes | sdkmanager --licenses

          # 安装需要的组件
          sdkmanager "build-tools;30.0.3" "platforms;android-30" "platform-tools"

          # ★ 关键一步：创建符号链接，让 Buildozer 能找到 sdkmanager
          mkdir -p tools/bin
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager tools/bin/sdkmanager

          # 验证 aidl 是否存在
          ls -l $ANDROID_HOME/build-tools/30.0.3/aidl

      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/build-tools/30.0.3:$PATH
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sniper-apk
          path: bin/*.apk