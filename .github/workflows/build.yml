name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv git openjdk-17-jdk unzip zip \
            libltdl-dev libffi-dev libssl-dev autoconf libtool \
            libc6-i386 lib32z1 lib32ncurses6 lib32stdc++6

      - name: Install Buildozer and Cython
        run: |
          pip3 install cython buildozer

      - name: Setup Android SDK (via official action)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-31 build-tools;30.0.3 platform-tools cmdline-tools;latest'

      - name: Create sdkmanager symlink (Buildozer needs this)
        run: |
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
                 /usr/local/lib/android/sdk/tools/bin/sdkmanager

      - name: Build APK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/build-tools/30.0.3:$PATH
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sniper-apk
          path: bin/*.apk