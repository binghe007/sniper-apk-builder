name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv git openjdk-17-jdk unzip zip \
            libltdl-dev libffi-dev libssl-dev autoconf libtool \
            libc6-i386 lib32z1 lib32ncurses6 lib32stdc++6

      - name: Install Buildozer and Cython
        run: |
          pip3 install cython buildozer

      - name: Install Android SDK (manually to ensure aidl)
        run: |
          # 创建 Buildozer 默认 SDK 目录
          ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT

          # 下载最新命令行工具
          cd $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          # 放置到 cmdline-tools/latest/ 目录 (正确结构)
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          # 接受许可
          yes | sdkmanager --licenses

          # 安装需要的组件 (包含 aidl 的 build-tools)
          sdkmanager "build-tools;30.0.3" "platforms;android-30" "platform-tools"

      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sniper-apk
          path: bin/*.apk