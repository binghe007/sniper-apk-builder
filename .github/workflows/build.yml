name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Buildozer Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv git openjdk-17-jdk unzip zip libltdl-dev libffi-dev libssl-dev autoconf libtool
          pip3 install cython buildozer
      - name: Build APK
        run: |
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sniper-apk
          path: bin/*.apk